{% extends "layouts/base.html" %}

{% block page_title %}My profile{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
  <div class="mb-6">
    <div class="section-kicker">Technician profile</div>
    <h1 class="section-title mt-2 text-3xl">My profile</h1>
  </div>

  <form method="post" class="surface-card grid gap-4 p-6 md:grid-cols-2">
    <div>
      <label class="text-xs text-slate-400">Title</label>
      <select name="title" class="mt-1 w-full px-3 py-2 text-sm">
        <option value="">No title</option>
        {% for option in title_options %}
          <option value="{{ option }}" {% if technician.title == option %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="text-xs text-slate-400">First name</label>
      <input name="full_name" required value="{{ technician.full_name or '' }}"
             class="mt-1 w-full px-3 py-2 text-sm">
    </div>

    <div>
      <label class="text-xs text-slate-400">Surname</label>
      <input name="surname" value="{{ technician.surname or '' }}"
             class="mt-1 w-full px-3 py-2 text-sm">
    </div>

    <div>
      <label class="text-xs text-slate-400">Gender</label>
      <select name="gender" class="mt-1 w-full px-3 py-2 text-sm">
        <option value="">Not specified</option>
        {% for option in gender_options %}
          <option value="{{ option }}" {% if technician.gender == option %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="text-xs text-slate-400">Email</label>
      <input name="email" type="email" required value="{{ technician.email or '' }}"
             class="mt-1 w-full px-3 py-2 text-sm">
    </div>

    <div>
      <label class="text-xs text-slate-400">Phone</label>
      <input name="phone" value="{{ technician.phone or '' }}"
             class="mt-1 w-full px-3 py-2 text-sm">
    </div>

    <div>
      <label class="text-xs text-slate-400">SA ID number</label>
      <input name="sa_id_number" maxlength="13" value="{{ technician.sa_id_number or '' }}"
             data-sa-id-source
             class="mt-1 w-full px-3 py-2 text-sm">
    </div>

    <div>
      <label class="text-xs text-slate-400">Date of birth</label>
      <input name="date_of_birth" type="date" value="{{ technician.date_of_birth or '' }}"
             data-sa-dob-target
             class="mt-1 w-full px-3 py-2 text-sm">
    </div>

    <div class="md:col-span-2 flex justify-end">
      <button type="submit" class="btn-primary px-4 py-2 text-sm">Save profile</button>
    </div>
  </form>
</div>
{% endblock %}
