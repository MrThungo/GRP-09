{% extends "layouts/base.html" %}

{% block page_title %}Add Supplier{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

<form method="POST"
      class="bg-[#0B1120] border border-slate-800 rounded-2xl p-8 space-y-5">

    <h2 class="text-2xl font-bold">
        Add Supplier
    </h2>

    <input name="name" placeholder="Supplier Name" required
           class="w-full px-4 py-3 bg-slate-900 rounded">

    <input name="contact_name" placeholder="Contact Person"
           class="w-full px-4 py-3 bg-slate-900 rounded">

    <input name="email" type="email" placeholder="Email"
           class="w-full px-4 py-3 bg-slate-900 rounded">

    <input name="phone" placeholder="Phone"
           class="w-full px-4 py-3 bg-slate-900 rounded">

    <textarea name="address"
              rows="4"
              placeholder="Address"
              class="w-full px-4 py-3 bg-slate-900 rounded"></textarea>

    <button class="px-6 py-3 bg-cyan-600 rounded text-white">
        Save Supplier
    </button>

</form>

</div>

{% endblock %}
