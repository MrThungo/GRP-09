{% extends "layouts/base.html" %}

{% block page_title %}
Edit Technician
{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <div class="mb-8">

        <p class="text-slate-400 mt-2">
            Update technician details and test assignments
        </p>

    </div>

    <form method="POST">

        <div class="bg-[#0B1120] border border-slate-800 rounded-2xl p-8">

            <!-- Personal Information -->

            <h2 class="text-xl font-semibold text-cyan-400 mb-6">
                Technician Information
            </h2>

            <div class="grid md:grid-cols-2 gap-6">

                <div>
                    <label class="block text-slate-300 mb-2">
                        Title
                    </label>

                    <select
                        name="title"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                        <option value="">No title</option>
                        {% for option in title_options %}
                        <option value="{{ option }}" {% if technician.title == option %}selected{% endif %}>{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        First Name
                    </label>

                    <input
                        type="text"
                        name="full_name"
                        value="{{ technician.full_name or '' }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                        required
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Surname
                    </label>

                    <input
                        type="text"
                        name="surname"
                        value="{{ technician.surname or '' }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Gender
                    </label>

                    <select
                        name="gender"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                        <option value="">Not specified</option>
                        {% for option in gender_options %}
                        <option value="{{ option }}" {% if technician.gender == option %}selected{% endif %}>{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        value="{{ technician.email or '' }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                        required
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Phone Number
                    </label>

                    <input
                        type="text"
                        name="phone"
                        value="{{ technician.phone or '' }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Employee Number
                    </label>

                    <input
                        type="text"
                        name="employee_number"
                        value="{{ technician.employee_number or '' }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        South African ID Number
                    </label>

                    <input
                        type="text"
                        name="sa_id_number"
                        value="{{ technician.sa_id_number or '' }}"
                        data-sa-id-source
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Date of Birth
                    </label>

                    <input
                        type="date"
                        name="date_of_birth"
                        value="{{ technician.date_of_birth or '' }}"
                        data-sa-dob-target
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        HPCSA Number
                    </label>

                    <input
                        type="text"
                        name="hpcsa_number"
                        value="{{ technician.hpcsa_number or '' }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white"
                    >
                </div>

            </div>

            <!-- Test Assignments -->

            <div class="mt-10">

                <h2 class="text-xl font-semibold text-cyan-400 mb-6">
                    Assigned Tests
                </h2>

                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">

                    {% for test in tests %}

                    <label class="flex items-center gap-3 bg-slate-900 border border-slate-700 rounded-lg p-3 hover:border-cyan-500 cursor-pointer">

                        <input
                            type="checkbox"
                            name="tests"
                            value="{{ test.id }}"
                            class="w-4 h-4"

                            {% if test.id|string in assigned_ids %}
                                checked
                            {% endif %}
                        >

                        <div>

                            <div class="text-white text-sm font-medium">
                                {{ test.name }}
                            </div>

                            <div class="text-slate-500 text-xs">
                                {{ test.code }}
                            </div>

                        </div>

                    </label>

                    {% endfor %}

                </div>

            </div>

            <!-- Buttons -->

            <div class="flex justify-end gap-3 mt-10">

                <a href="{{ url_for('manager.technicians') }}"
                   class="px-5 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="px-5 py-3 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg font-semibold">

                    Save Changes

                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
