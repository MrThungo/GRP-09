{% extends "layouts/base.html" %}

{% block page_title %}
Add Technician
{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <div class="mb-8">
        <h1 class="text-4xl font-bold text-white">
            Add Laboratory Technician
        </h1>

        <p class="text-slate-400 mt-2">
            Create a new technician account.
        </p>
    </div>

    <div class="bg-[#0B1120] border border-slate-800 rounded-2xl p-8">

        <form method="POST">

            <div class="grid md:grid-cols-2 gap-6">

                <!-- Title -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        Title
                    </label>

                    <select name="title"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                        <option value="">No title</option>
                        {% for option in title_options %}
                        <option value="{{ option }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Full Name -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        First Name
                    </label>

                    <input type="text"
                           name="full_name"
                           required
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

                <!-- Surname -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        Surname
                    </label>

                    <input type="text"
                           name="surname"
                           required
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

                <!-- Gender -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        Gender
                    </label>

                    <select name="gender"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                        <option value="">Not specified</option>
                        {% for option in gender_options %}
                        <option value="{{ option }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        Email Address
                    </label>

                    <input type="email"
                           name="email"
                           required
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        Phone Number
                    </label>

                    <input type="text"
                           name="phone"
                           required
                           maxlength="20"
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

                <!-- Employee Number -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        Employee Number
                    </label>

                    <input type="text"
                           name="employee_number"
                           required
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

                <!-- SA ID -->
                <div>
                    <label class="block text-slate-300 mb-2">
                        SA ID Number
                    </label>

                    <input type="text"
                           name="sa_id_number"
                           maxlength="13"
                           data-sa-id-source
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Date of Birth
                    </label>

                    <input type="date"
                           name="date_of_birth"
                           data-sa-dob-target
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>

        

            </div>

            <div class="mt-8">
                <label class="block text-slate-300 mb-3">
                    Assigned Test Types
                </label>
                <div class="grid md:grid-cols-2 gap-2">
                    {% for test in tests %}
                    <label class="flex items-center gap-2 p-3 bg-slate-900 border border-slate-800 rounded-lg">
                        <input type="checkbox" name="tests" value="{{ test.id }}">
                        <span class="text-sm">{{ test.code }} - {{ test.name }}</span>
                    </label>
                    {% endfor %}
                </div>
                <p class="text-xs text-slate-500 mt-2">At least one test type is required.</p>
            </div>

            <div class="mt-8 flex gap-4">

                <button type="submit"
                        class="px-6 py-3 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg font-semibold">

                    Create Technician

                </button>

                <a href="{{ url_for('manager.technicians') }}"
                   class="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-semibold">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
