{% extends "layouts/base.html" %}
{% block title %}Change username{% endblock %}
{% block page_title %}Change username{% endblock %}
{% block content %}
<form method="post" class="max-w-md bg-slate-950 border border-slate-800 rounded-lg p-6 space-y-4">
  <p class="text-sm text-slate-400">Your e-mail address is your username.</p>
  <div>
    <label class="text-xs text-slate-400">New e-mail address</label>
    <input name="email" type="email" required value="{{ current_user.email }}"
           class="w-full mt-1 px-3 py-2 bg-slate-900 border border-slate-800 rounded text-sm">
  </div>
  <div>
    <label class="text-xs text-slate-400">Current password</label>
    <div class="mt-1 flex gap-2">
      <input name="password" type="password" required data-password-field
             class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded text-sm">
      <button type="button" data-toggle-password
              class="px-3 py-2 bg-slate-800 hover:bg-slate-700 rounded text-xs">Show</button>
    </div>
  </div>
  <button class="px-4 py-2 bg-sky-600 hover:bg-sky-500 rounded text-sm">Update username</button>
</form>
{% endblock %}
